spring.application.name=tarefa
server.port=8080

# Datasource configured via environment variables (from .env / Docker)
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:JalaTask}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:Aluno123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

admin.system=${ADMIN_SISTEM:admin@admin.com}
admin.password=${PASSWORD_ADMIM:Admin123}
spring.config.import=optional:classpath:.env

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration properties with default values
api.security.token.secret=${JWT_SECRET:my-secret-key-todo-list}

# Enable execution of SQL initialization scripts after Hibernate schema update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.encoding=UTF-8
